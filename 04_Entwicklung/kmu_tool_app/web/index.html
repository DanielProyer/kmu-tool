<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="KMU Tool - WebTool für Schweizer Handwerksbetriebe">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kmu_tool_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>KMU Tool</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Auto-reload on new version (cache-busted fetch)
    async function checkVersion() {
      try {
        const resp = await fetch('version.json?t=' + Date.now());
        if (!resp.ok) return;
        const data = await resp.json();
        const stored = localStorage.getItem('kmu_tool_version');
        if (stored && stored !== data.version) {
          localStorage.setItem('kmu_tool_version', data.version);
          // Hard reload: clear cache for this page
          caches.keys().then(names => names.forEach(n => caches.delete(n)));
          location.reload();
          return; // Don't load flutter yet, will reload
        }
        localStorage.setItem('kmu_tool_version', data.version);
      } catch (e) {}
      // Load Flutter with cache-busting timestamp
      const s = document.createElement('script');
      s.src = 'flutter_bootstrap.js?v=' + (localStorage.getItem('kmu_tool_version') || Date.now());
      s.async = true;
      document.body.appendChild(s);
    }
    checkVersion();
  </script>
</body>
</html>
